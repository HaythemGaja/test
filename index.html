<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitRestore Studio - PWA & Repo Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Ace Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.0/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.0/ext-modelist.min.js"></script>
    <!-- Marked for Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <style>
        :root {
            --gh-dark: #0d1117;
            --gh-border: #30363d;
            --gh-blue: #58a6ff;
            --gh-sidebar: #161b22;
        }
        body {
            background-color: var(--gh-dark);
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }
        .sidebar { background-color: var(--gh-sidebar); border-right: 1px solid var(--gh-border); }
        .btn-primary { background-color: #238636; transition: background 0.2s; }
        .btn-primary:hover { background-color: #2ea043; }
        
        .card { background-color: #161b22; border: 1px solid var(--gh-border); border-radius: 6px; }
        
        #editor { width: 100%; flex: 1; border: 1px solid var(--gh-border); border-radius: 4px; min-height: 200px; }
        
        /* Maximize State Logic */
        .editor-maximized {
            position: fixed !important;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            height: 100vh !important;
            width: 100vw !important;
            background: var(--gh-dark);
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .file-item:hover .file-actions { display: flex; }
        
        select, input, textarea { color-scheme: dark; }

        /* Diff Styling */
        .diff-added { background-color: rgba(46, 160, 67, 0.15); color: #7ee787; border-left: 4px solid #2ea043; }
        .diff-removed { background-color: rgba(248, 81, 73, 0.15); color: #ffa198; border-left: 4px solid #f85149; }
        .diff-line { padding: 2px 8px; border-bottom: 1px solid #30363d11; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--gh-dark); }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .tab-active { border-bottom: 2px solid var(--gh-blue); color: var(--gh-blue); font-weight: 600; }
        
        .shimmer {
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 1024px) {
            .mobile-sidebar-hidden { display: none !important; }
            .mobile-sidebar-visible {
                position: fixed; top: 57px; left: 0; bottom: 0; z-index: 40; width: 85%;
                display: flex !important; box-shadow: 20px 0 50px rgba(0,0,0,0.5);
            }
        }

        #run-frame { background: white; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="border-b border-[#30363d] p-3 flex justify-between items-center bg-[#161b22] z-50 shrink-0">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 p-1">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <i class="fab fa-github text-2xl text-white hidden sm:block"></i>
            <h1 class="text-md font-bold tracking-tight">GitRestore <span class="hidden xs:inline text-[10px] bg-blue-600/20 text-blue-400 px-1.5 py-0.5 rounded ml-1 uppercase">Studio</span></h1>
        </div>
        <div id="user-info" class="hidden flex items-center gap-2 sm:gap-4">
            <button onclick="toggleGlobalSearch()" class="text-gray-400 hover:text-white p-2">
                <i class="fas fa-search"></i>
            </button>
            <span id="username" class="text-xs font-medium opacity-80 hidden md:block"></span>
            <button onclick="logout()" class="text-[10px] text-red-400 border border-red-900/30 px-2 py-1 rounded">Logout</button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <!-- Auth View -->
        <div id="auth-view" class="flex-1 flex flex-col items-center justify-center p-6 bg-[#0d1117]">
            <div class="card p-8 max-w-md w-full text-center shadow-2xl border-blue-500/20">
                <i class="fas fa-terminal text-4xl mb-4 text-blue-500"></i>
                <h2 class="text-2xl font-bold mb-2">Studio Login</h2>
                <input type="password" id="pat-token" placeholder="Personal Access Token" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-3 mb-4 focus:border-blue-500 outline-none">
                <button onclick="login()" class="btn-primary w-full py-3 rounded font-bold text-white">Initialize Workspace</button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="hidden flex-1 flex flex-row overflow-hidden">
            
            <aside id="repo-sidebar" class="sidebar w-64 flex flex-col shrink-0 mobile-sidebar-hidden">
                <div class="p-3 border-b border-[#30363d] flex justify-between items-center bg-[#161b22]">
                    <h3 class="font-bold text-[10px] text-gray-400 uppercase tracking-widest">Repositories</h3>
                    <button onclick="showModal('create-repo-modal')" class="text-green-500"><i class="fas fa-plus-circle text-lg"></i></button>
                </div>
                <div class="p-2">
                    <input type="text" id="repo-search" onkeyup="filterRepos()" placeholder="Filter..." class="w-full bg-[#0d1117] border border-[#30363d] text-xs rounded px-3 py-2">
                </div>
                <div id="repo-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
            </aside>

            <section class="flex-1 flex flex-col overflow-hidden bg-[#0d1117]">
                
                <div class="p-2 border-b border-[#30363d] flex flex-wrap justify-between items-center bg-[#161b22] shrink-0">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <span class="text-blue-400 font-bold text-xs truncate" id="current-repo-name">Studio Workspace</span>
                        <div id="branch-selector-container" class="hidden flex items-center bg-[#0d1117] px-2 py-0.5 rounded border border-[#30363d]">
                            <select id="branch-select" onchange="switchBranch()" class="bg-transparent text-[10px] outline-none cursor-pointer"></select>
                        </div>
                    </div>
                    <div id="repo-nav-tabs" class="hidden flex gap-1">
                        <button onclick="switchViewTab('explorer')" id="vtab-explorer" class="text-[10px] px-2 py-1 rounded bg-[#30363d] text-white">FILES</button>
                        <button onclick="switchViewTab('issues')" id="vtab-issues" class="text-[10px] px-2 py-1 rounded text-gray-400">ISSUES</button>
                        <button onclick="showPagesSettings()" class="text-[10px] px-2 py-1 rounded text-orange-400"><i class="fas fa-rocket"></i></button>
                    </div>
                </div>

                <div class="flex-1 flex flex-row overflow-hidden relative">
                    
                    <div id="view-explorer" class="flex flex-1 overflow-hidden">
                        <div id="file-sidebar" class="w-64 border-r border-[#30363d] flex flex-col bg-[#0d1117] shrink-0 mobile-sidebar-hidden lg:flex">
                            <div class="p-3 border-b border-[#30363d] bg-[#161b22]/30 flex justify-between">
                                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Explorer</span>
                                <button id="new-file-btn" onclick="showModal('new-file-modal')" class="text-blue-400 hidden"><i class="fas fa-plus-square"></i></button>
                            </div>
                            <div class="flex-1 overflow-y-auto" id="file-explorer"></div>
                        </div>

                        <div class="flex-1 flex flex-col overflow-hidden bg-[#0d1117] relative" id="editor-pane">
                            <div id="file-details" class="flex-1 flex flex-col overflow-hidden hidden">
                                
                                <div class="p-3 border-b border-[#30363d] flex justify-between items-center shrink-0">
                                    <div class="flex items-center gap-2 overflow-hidden">
                                        <h2 id="view-file-name" class="text-xs font-mono truncate text-gray-400 max-w-[150px]"></h2>
                                        <button id="edit-toggle-btn" onclick="toggleEditMode()" class="bg-blue-600 text-white text-[9px] px-2 py-1 rounded font-bold uppercase">Edit</button>
                                        <button onclick="toggleMaximize()" class="text-gray-500 hover:text-white"><i class="fas fa-expand-arrows-alt text-xs" id="maximize-icon"></i></button>
                                    </div>
                                    <button onclick="closeFileView()" class="text-gray-500"><i class="fas fa-times"></i></button>
                                </div>
                                
                                <div class="px-3 flex border-b border-[#30363d] gap-4 shrink-0">
                                    <button onclick="switchEditorTab('edit')" id="etab-edit" class="py-2 text-[10px] font-bold tab-active">EDITOR</button>
                                    <button onclick="switchEditorTab('diff')" id="etab-diff" class="py-2 text-[10px] font-bold text-gray-500">DIFF <span id="diff-label" class="text-[8px] bg-blue-500/20 px-1 rounded">LOCAL</span></button>
                                    <button onclick="switchEditorTab('run')" id="etab-run" class="hidden py-2 text-[10px] font-bold text-green-500">RUN</button>
                                    <button onclick="switchEditorTab('preview')" id="etab-preview" class="hidden py-2 text-[10px] font-bold text-gray-500">MD</button>
                                    <button onclick="switchEditorTab('history')" id="etab-history" class="py-2 text-[10px] font-bold text-gray-500">HISTORY</button>
                                </div>

                                <div id="editor-tab-wrapper" class="flex-1 flex flex-col min-h-0 overflow-hidden relative">
                                    
                                    <!-- TAB: EDITOR -->
                                    <div id="edit-container" class="flex-1 flex flex-col overflow-hidden p-2">
                                        <div id="editor"></div>
                                        <div id="commit-section" class="mt-2 hidden flex flex-col shrink-0">
                                            <textarea id="commit-msg" rows="4" placeholder="Detailed commit message..." class="w-full bg-[#161b22] border border-[#30363d] rounded p-3 text-xs focus:border-blue-500 outline-none resize-none"></textarea>
                                            <div class="flex justify-between items-center mt-2">
                                                <span class="text-[9px] text-gray-500" id="file-stats">Ready</span>
                                                <button onclick="saveChanges()" class="btn-primary px-8 py-2 rounded font-bold text-[10px] text-white">COMMIT CHANGES</button>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- TAB: DIFF (FIXED SCROLLING) -->
                                    <div id="diff-container" class="hidden absolute inset-0 flex flex-col overflow-hidden bg-[#0d1117] p-2">
                                        <div id="diff-header" class="text-[9px] text-gray-500 mb-2 flex justify-between items-center uppercase px-2">
                                            <span id="diff-mode-text">Comparing: Editor vs Server (Local Changes)</span>
                                            <button onclick="switchEditorTab('edit')" class="hover:text-white">Back to Editor</button>
                                        </div>
                                        <div class="flex-1 overflow-y-auto border border-[#30363d] rounded">
                                            <div id="diff-view" class="font-mono text-[11px] whitespace-pre min-h-full"></div>
                                        </div>
                                    </div>

                                    <!-- TAB: RUN -->
                                    <div id="run-container" class="hidden absolute inset-0 flex flex-col bg-white overflow-hidden">
                                        <iframe id="run-frame" sandbox="allow-scripts allow-forms allow-modals"></iframe>
                                    </div>

                                    <!-- TAB: PREVIEW -->
                                    <div id="preview-container" class="hidden absolute inset-0 prose prose-invert max-w-none bg-[#0d1117] p-4 border border-[#30363d] overflow-y-auto"></div>

                                    <!-- TAB: HISTORY -->
                                    <div id="history-container" class="hidden absolute inset-0 space-y-2 overflow-y-auto p-2 bg-[#0d1117]"></div>
                                </div>
                            </div>
                            
                            <div id="empty-editor-state" class="flex-1 flex flex-col items-center justify-center text-gray-700 opacity-40">
                                <i class="fas fa-terminal text-6xl mb-4"></i>
                                <p class="text-xs uppercase font-bold tracking-widest">Select file to initialize studio</p>
                            </div>
                        </div>
                    </div>

                    <div id="view-issues" class="hidden flex-1 overflow-y-auto p-4 bg-[#0d1117]">
                        <div id="issue-list" class="space-y-2"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Overlays -->
    <div id="global-search-overlay" class="fixed inset-0 modal-overlay hidden z-[100] p-4 flex flex-col items-center">
        <div class="w-full max-w-2xl card p-4 shadow-2xl mt-10">
            <div class="flex items-center gap-3 border-b border-[#30363d] pb-2 mb-4">
                <i class="fas fa-search text-blue-500"></i>
                <input type="text" id="global-search-input" onkeyup="if(event.key==='Enter') executeGlobalSearch()" placeholder="Deep search current repo..." class="flex-1 bg-transparent text-sm outline-none">
                <button onclick="toggleGlobalSearch()"><i class="fas fa-times"></i></button>
            </div>
            <div id="search-results" class="max-h-[50vh] overflow-y-auto"></div>
        </div>
    </div>

    <div id="restore-modal" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-[110]">
        <div class="card p-5 max-w-sm w-full">
            <h3 class="text-sm font-bold mb-2 text-blue-400">Restore Point</h3>
            <p class="text-[10px] mb-4 text-gray-400">Overwrite current branch with this version?</p>
            <div class="flex justify-end gap-3">
                <button onclick="hideModal('restore-modal')" class="text-xs text-gray-500">Cancel</button>
                <button id="confirm-restore-btn" class="btn-primary px-4 py-1.5 rounded text-[10px] font-bold text-white uppercase">Confirm Restore</button>
            </div>
        </div>
    </div>

    <div id="create-repo-modal" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-[110]">
        <div class="card p-5 max-w-sm w-full">
            <h3 class="text-sm font-bold mb-4 uppercase tracking-tighter">New Repository</h3>
            <input type="text" id="new-repo-name" placeholder="Repository name" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-xs mb-4 outline-none">
            <div class="flex justify-end gap-3">
                <button onclick="hideModal('create-repo-modal')" class="text-gray-500 text-sm">Cancel</button>
                <button onclick="createRepo()" class="btn-primary px-4 py-1.5 rounded text-[10px] font-bold text-white">Create</button>
            </div>
        </div>
    </div>

    <div id="new-file-modal" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-[110]">
        <div class="card p-5 max-w-sm w-full">
            <h3 class="text-sm font-bold mb-4 uppercase">New File</h3>
            <input type="text" id="new-filename" placeholder="path/to/script.js" class="w-full bg-[#0d1117] border border-[#30363d] rounded p-2 text-xs mb-4 outline-none">
            <div class="flex justify-end gap-3">
                <button onclick="hideModal('new-file-modal')" class="text-xs text-gray-500">Cancel</button>
                <button onclick="createFile()" class="btn-primary px-4 py-1.5 rounded text-[10px] font-bold text-white">Create</button>
            </div>
        </div>
    </div>

    <div id="delete-repo-modal" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-[120]">
        <div class="card p-5 max-w-sm w-full border-red-600">
            <h3 class="text-sm font-bold mb-2 text-red-500 uppercase">Confirm Delete</h3>
            <p class="text-[10px] mb-4 text-gray-400">Type <strong class="text-white" id="delete-confirm-text"></strong></p>
            <input type="text" id="delete-repo-confirm-input" class="w-full bg-red-900/10 border border-red-900/50 rounded p-2 text-xs mb-4 outline-none">
            <button onclick="deleteRepository()" id="final-delete-btn" class="w-full bg-red-600 py-2 rounded text-[10px] font-bold text-white opacity-50" disabled>DELETE PERMANENTLY</button>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-4 left-4 right-4 sm:left-auto sm:right-4 z-[200] flex flex-col gap-2"></div>

    <script>
        let token = '';
        let user = null;
        let repos = [];
        let currentRepo = null; 
        let currentDir = ''; 
        let activeFilePath = ''; 
        let currentFileSha = '';
        let currentFileData = ''; 
        let currentBranch = '';
        let editor;
        let isEditMode = false;

        window.onload = () => {
            editor = ace.edit("editor");
            editor.setTheme("ace/theme/one_dark");
            editor.setShowPrintMargin(false);
            editor.setReadOnly(true); 
            editor.setOptions({
                fontSize: "13px",
                enableBasicAutocompletion: true,
                useSoftTabs: true,
                tabSize: 2,
                scrollPastEnd: 0.5,
                wrap: true
            });

            const savedToken = sessionStorage.getItem('gh_token');
            if (savedToken) {
                token = savedToken;
                validateAndInit();
            }
        };

        async function ghApi(endpoint, options = {}) {
            const res = await fetch(`https://api.github.com${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    ...options.headers
                }
            });
            return res;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { error: 'bg-red-600', success: 'bg-green-600', info: 'bg-blue-600' };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded shadow-2xl flex items-center gap-2 transition-all duration-300 transform text-[10px] font-bold uppercase tracking-widest`;
            toast.innerHTML = `<i class="fas ${type==='error'?'fa-circle-xmark':'fa-circle-check'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-2'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function decodeBase64(b64) {
            try {
                const cleaned = b64.replace(/\s/g, '');
                const binaryString = atob(cleaned);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                return new TextDecoder('utf-8').decode(bytes);
            } catch (e) { return "Incompatible file type for studio viewer."; }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('repo-sidebar');
            sidebar.classList.toggle('mobile-sidebar-hidden');
            sidebar.classList.toggle('mobile-sidebar-visible');
        }

        function toggleEditMode() {
            if (!activeFilePath) return;
            isEditMode = !isEditMode;
            editor.setReadOnly(!isEditMode);
            const btn = document.getElementById('edit-toggle-btn');
            const section = document.getElementById('commit-section');
            if (isEditMode) {
                btn.textContent = 'Exit Edit';
                btn.classList.replace('bg-blue-600', 'bg-gray-600');
                section.classList.remove('hidden');
                editor.focus();
            } else {
                btn.textContent = 'Edit';
                btn.classList.replace('bg-gray-600', 'bg-blue-600');
                section.classList.add('hidden');
            }
            editor.resize();
        }

        function toggleMaximize() {
            const pane = document.getElementById('editor-pane');
            const icon = document.getElementById('maximize-icon');
            const isMax = pane.classList.toggle('editor-maximized');
            icon.classList.toggle('fa-expand-arrows-alt', !isMax);
            icon.classList.toggle('fa-compress-arrows-alt', isMax);
            setTimeout(() => editor.resize(), 100);
        }

        async function login() {
            const input = document.getElementById('pat-token');
            token = input.value.trim();
            if (!token) return showToast('Token required', 'error');
            validateAndInit();
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        async function validateAndInit() {
            try {
                const res = await ghApi('/user');
                if (!res.ok) throw new Error('Auth failed');
                user = await res.json();
                sessionStorage.setItem('gh_token', token);
                document.getElementById('username').textContent = `@${user.login}`;
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('auth-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                fetchRepos();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function fetchRepos() {
            try {
                const res = await ghApi('/user/repos?sort=updated&per_page=100');
                repos = await res.json();
                renderRepos(repos);
            } catch (err) { showToast('Repo load failed', 'error'); }
        }

        function renderRepos(data) {
            document.getElementById('repo-list').innerHTML = data.map(repo => `
                <div onclick="selectRepo('${repo.full_name}', '${repo.default_branch}')" class="p-2 text-[10px] rounded cursor-pointer hover:bg-[#1f2937] transition truncate ${currentRepo === repo.full_name ? 'bg-blue-600/10 text-blue-400 font-bold' : 'text-gray-400'}">
                    <i class="fas ${repo.private ? 'fa-lock' : 'fa-globe'} mr-2 opacity-50"></i>
                    ${repo.name}
                </div>
            `).join('');
        }

        function filterRepos() {
            const q = document.getElementById('repo-search').value.toLowerCase();
            renderRepos(repos.filter(r => r.name.toLowerCase().includes(q)));
        }

        async function selectRepo(fullName, defaultBranch) {
            currentRepo = fullName;
            currentBranch = defaultBranch;
            document.getElementById('current-repo-name').textContent = fullName;
            document.getElementById('repo-nav-tabs').classList.remove('hidden');
            document.getElementById('new-file-btn').classList.remove('hidden');
            document.getElementById('branch-selector-container').classList.remove('hidden');
            
            const sidebar = document.getElementById('repo-sidebar');
            if (sidebar.classList.contains('mobile-sidebar-visible')) toggleSidebar();
            
            renderRepos(repos);
            await fetchBranches();
            switchViewTab('explorer');
            fetchFiles('');
        }

        async function fetchBranches() {
            const res = await ghApi(`/repos/${currentRepo}/branches`);
            const branches = await res.json();
            const select = document.getElementById('branch-select');
            const html = branches.map(b => `<option value="${b.name}" ${b.name === currentBranch ? 'selected' : ''}>${b.name}</option>`).join('');
            select.innerHTML = html;
        }

        function switchBranch() {
            currentBranch = document.getElementById('branch-select').value;
            fetchFiles('');
        }

        function switchViewTab(tab) {
            ['explorer', 'issues'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                if (el) el.classList.add('hidden');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            ['explorer', 'issues'].forEach(t => {
                const btn = document.getElementById(`vtab-${t}`);
                if (btn) btn.classList.toggle('bg-[#30363d]', t === tab);
            });
            if (tab === 'issues') fetchIssues();
        }

        async function fetchFiles(path = '') {
            currentDir = path;
            const explorer = document.getElementById('file-explorer');
            explorer.innerHTML = '<div class="p-4 shimmer h-10 rounded mb-2"></div>';
            try {
                const res = await ghApi(`/repos/${currentRepo}/contents/${path}?ref=${currentBranch}`);
                const files = await res.json();
                let html = '';
                if (path !== '') {
                    const parent = path.split('/').slice(0, -1).join('/');
                    html += `<div onclick="fetchFiles('${parent}')" class="p-2 text-[10px] cursor-pointer text-blue-400 font-bold"><i class="fas fa-arrow-left mr-2"></i> BACK</div>`;
                }
                files.sort((a,b) => (a.type === 'dir' ? -1 : 1)).forEach(file => {
                    const icon = file.type === 'dir' ? 'fa-folder text-yellow-500' : 'fa-file-code text-blue-400';
                    html += `
                        <div class="file-item p-2 text-[10px] cursor-pointer hover:bg-[#1f2937] flex justify-between group rounded">
                            <span onclick="${file.type === 'dir' ? `fetchFiles('${file.path}')` : `openFile('${file.path}')`}" class="flex-1 truncate">
                                <i class="fas ${icon} mr-2 w-4 text-center"></i> ${file.name}
                            </span>
                            <div class="file-actions hidden gap-2">
                                <i onclick="deleteFile('${file.path}')" class="fas fa-trash text-red-500 hover:scale-125"></i>
                            </div>
                        </div>`;
                });
                explorer.innerHTML = html;
            } catch (err) { explorer.innerHTML = `<div class="p-4 text-xs text-center">Empty</div>`; }
        }

        async function openFile(path) {
            activeFilePath = path;
            isEditMode = false;
            editor.setReadOnly(true);
            document.getElementById('edit-toggle-btn').textContent = 'Edit';
            document.getElementById('commit-section').classList.add('hidden');
            document.getElementById('empty-editor-state').classList.add('hidden');
            document.getElementById('file-details').classList.remove('hidden');
            document.getElementById('view-file-name').textContent = path;
            
            const modelist = ace.require("ace/ext/modelist");
            editor.session.setMode(modelist.getModeForPath(path).mode);

            const isMD = path.endsWith('.md');
            const isHTML = path.endsWith('.html') || path.endsWith('.htm');
            document.getElementById('etab-preview').classList.toggle('hidden', !isMD);
            document.getElementById('etab-run').classList.toggle('hidden', !isHTML);

            try {
                const res = await ghApi(`/repos/${currentRepo}/contents/${path}?ref=${currentBranch}`);
                const data = await res.json();
                currentFileSha = data.sha;
                currentFileData = decodeBase64(data.content || "");
                editor.setValue(currentFileData, -1);
                switchEditorTab('edit');
                fetchHistory(path);
                document.getElementById('file-stats').textContent = `${currentFileData.split('\n').length} LINES`;
                setTimeout(() => editor.resize(), 50);
            } catch (err) { showToast('Load error', 'error'); }
        }

        function switchEditorTab(tab) {
            ['edit', 'diff', 'preview', 'history', 'run'].forEach(t => {
                const el = document.getElementById(t === 'edit' ? 'edit-container' : `${t}-container`);
                if (el) el.classList.add('hidden');
                const btn = document.getElementById(`etab-${t}`);
                if (btn) btn.classList.remove('tab-active');
            });
            
            const target = tab === 'edit' ? 'edit-container' : `${tab}-container`;
            document.getElementById(target).classList.remove('hidden');
            document.getElementById(`etab-${tab}`).classList.add('tab-active');

            if (tab === 'preview') document.getElementById('preview-container').innerHTML = marked.parse(editor.getValue());
            if (tab === 'diff') generateLocalDiff();
            if (tab === 'run') {
                const frame = document.getElementById('run-frame');
                frame.srcdoc = editor.getValue();
            }
            editor.resize();
        }

        function generateLocalDiff() {
            document.getElementById('diff-mode-text').textContent = "Local Changes (Editor vs Server)";
            document.getElementById('diff-label').textContent = "LOCAL";
            renderDiff(currentFileData, editor.getValue());
        }

        async function diffCommit(sha) {
            try {
                showToast('Fetching historical content...');
                const res = await ghApi(`/repos/${currentRepo}/contents/${activeFilePath}?ref=${sha}`);
                const data = await res.json();
                const oldContent = decodeBase64(data.content || "");
                
                switchEditorTab('diff');
                document.getElementById('diff-mode-text').textContent = `Version History (Commit ${sha.substring(0,7)} vs Current Server)`;
                document.getElementById('diff-label').textContent = "VERSION";
                renderDiff(oldContent, currentFileData);
            } catch (err) { showToast('History Diff Failed', 'error'); }
        }

        async function runHistoricalVersion(sha) {
            try {
                showToast('Preparing preview...');
                const res = await ghApi(`/repos/${currentRepo}/contents/${activeFilePath}?ref=${sha}`);
                const data = await res.json();
                const content = decodeBase64(data.content || "");
                
                // Create a data blob for the new tab
                const blob = new Blob([content], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
            } catch (err) { showToast('Execution Failed', 'error'); }
        }

        function renderDiff(base, modified) {
            const baseLines = base.split('\n');
            const modLines = modified.split('\n');
            const diffView = document.getElementById('diff-view');
            let html = '';
            
            const max = Math.max(baseLines.length, modLines.length);
            for (let i = 0; i < max; i++) {
                const bLine = baseLines[i] || '';
                const mLine = modLines[i] || '';
                
                if (bLine === mLine) {
                    html += `<div class="diff-line">  ${escapeHtml(mLine)}</div>`;
                } else {
                    if (i < baseLines.length) html += `<div class="diff-line diff-removed">- ${escapeHtml(bLine)}</div>`;
                    if (i < modLines.length) html += `<div class="diff-line diff-added">+ ${escapeHtml(mLine)}</div>`;
                }
            }
            diffView.innerHTML = html || '<div class="p-4 text-gray-500 italic">Binary file or no changes detected.</div>';
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        async function saveChanges() {
            const message = document.getElementById('commit-msg').value.trim();
            if (!message) return showToast('Commit message required', 'error');
            try {
                const res = await ghApi(`/repos/${currentRepo}/contents/${activeFilePath}`, {
                    method: 'PUT',
                    body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(editor.getValue()))), sha: currentFileSha, branch: currentBranch })
                });
                if (res.ok) { showToast('Committed!', 'success'); document.getElementById('commit-msg').value = ''; openFile(activeFilePath); }
                else throw new Error('API Error');
            } catch (err) { showToast('Commit failed', 'error'); }
        }

        async function executeGlobalSearch() {
            const q = document.getElementById('global-search-input').value.trim();
            const resultsEl = document.getElementById('search-results');
            if (!q) return;
            resultsEl.innerHTML = '<div class="p-4 text-center text-xs animate-pulse">Searching code index...</div>';
            try {
                const res = await ghApi(`/search/code?q=${encodeURIComponent(q)}+repo:${currentRepo}`);
                const data = await res.json();
                resultsEl.innerHTML = data.items.map(item => `
                    <div onclick="openFile('${item.path}'); toggleGlobalSearch();" class="card p-2 text-[10px] cursor-pointer mb-1 truncate">${item.path}</div>
                `).join('') || '<div class="text-center text-xs p-4">No code matches found.</div>';
            } catch (err) { resultsEl.innerHTML = 'Index search failed'; }
        }

        function toggleGlobalSearch() {
            const overlay = document.getElementById('global-search-overlay');
            overlay.classList.toggle('hidden');
            if (!overlay.classList.contains('hidden')) document.getElementById('global-search-input').focus();
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).style.display = 'flex'; }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).style.display = 'none'; }
        
        function closeFileView() { 
            document.getElementById('editor-pane').classList.remove('editor-maximized');
            document.getElementById('file-details').classList.add('hidden'); 
            document.getElementById('empty-editor-state').classList.remove('hidden'); 
            activeFilePath = '';
        }

        async function fetchIssues() {
            const list = document.getElementById('issue-list');
            list.innerHTML = '<div class="shimmer h-10 rounded"></div>';
            const res = await ghApi(`/repos/${currentRepo}/issues?state=open`);
            const data = await res.json();
            list.innerHTML = data.map(i => `<div class="card p-3 text-[10px] font-bold"><i class="fas fa-exclamation-circle text-green-500 mr-2"></i>${i.title}</div>`).join('') || 'No open issues.';
        }

        async function fetchHistory(path) {
            const list = document.getElementById('history-container');
            const res = await ghApi(`/repos/${currentRepo}/commits?path=${path}&sha=${currentBranch}`);
            const data = await res.json();
            list.innerHTML = data.map(c => `
                <div class="card p-3 flex flex-col gap-2 text-[9px]">
                    <div class="truncate">
                        <div class="font-bold text-gray-200">${c.commit.message}</div>
                        <div class="text-gray-500">${new Date(c.commit.author.date).toLocaleString()}</div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="diffCommit('${c.sha}')" class="flex-1 bg-blue-600/20 text-blue-400 py-1.5 rounded font-bold uppercase tracking-widest border border-blue-500/30">DIFF</button>
                        <button onclick="runHistoricalVersion('${c.sha}')" class="flex-1 bg-purple-600/20 text-purple-400 py-1.5 rounded font-bold uppercase tracking-widest border border-purple-500/30">RUN</button>
                        <button onclick="requestRestore('${c.sha}')" class="flex-1 bg-green-600/20 text-green-500 py-1.5 rounded font-bold uppercase tracking-widest border border-green-500/30">RESTORE</button>
                    </div>
                </div>
            `).join('') || 'No history found.';
        }

        function requestRestore(sha) {
             document.getElementById('restore-filename').textContent = activeFilePath;
             showModal('restore-modal');
             document.getElementById('confirm-restore-btn').onclick = async () => {
                 const res = await ghApi(`/repos/${currentRepo}/contents/${activeFilePath}?ref=${sha}`);
                 const data = await res.json();
                 const content = decodeBase64(data.content);
                 await ghApi(`/repos/${currentRepo}/contents/${activeFilePath}`, {
                     method: 'PUT',
                     body: JSON.stringify({ message: 'Rollback to historical version', content: btoa(unescape(encodeURIComponent(content))), sha: currentFileSha, branch: currentBranch })
                 });
                 showToast('Version Restored!', 'success'); openFile(activeFilePath); hideModal('restore-modal');
             }
        }

        async function createFile() {
            const name = document.getElementById('new-filename').value.trim();
            if (!name) return;
            const res = await ghApi(`/repos/${currentRepo}/contents/${name}`, { method: 'PUT', body: JSON.stringify({ message: `Initialize ${name}`, content: '', branch: currentBranch }) });
            if (res.ok) { showToast('File initialized!'); hideModal('new-file-modal'); fetchFiles(currentDir); }
        }

        function promptDeleteRepo() {
            document.getElementById('delete-confirm-text').textContent = currentRepo;
            const input = document.getElementById('delete-repo-confirm-input');
            input.value = '';
            input.oninput = () => {
                const btn = document.getElementById('final-delete-btn');
                btn.disabled = input.value !== currentRepo;
                btn.classList.toggle('opacity-50', btn.disabled);
            };
            showModal('delete-repo-modal');
        }

        async function deleteRepository() {
            const res = await ghApi(`/repos/${currentRepo}`, { method: 'DELETE' });
            if (res.status === 204) location.reload();
        }

        async function generatePWAFile(type) {
            const name = type === 'manifest' ? 'manifest.json' : 'sw.js';
            const content = type === 'manifest' ? '{"name":"App"}' : 'self.addEventListener("fetch",()=>{})';
            await ghApi(`/repos/${currentRepo}/contents/${currentDir?currentDir+'/':''}${name}`, { method: 'PUT', body: JSON.stringify({ message: `Init PWA ${name}`, content: btoa(content), branch: currentBranch }) });
            showToast('Generated!', 'success'); fetchFiles(currentDir);
        }

        function showPagesSettings() { switchViewTab('pages'); }
        function showRepoSettings() { switchViewTab('repo-settings'); }
        async function savePagesConfig() { showToast('Pages not configured in this turn', 'info'); }

    </script>
</body>
</html>
